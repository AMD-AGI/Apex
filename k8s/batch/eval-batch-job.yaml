apiVersion: batch/v1
kind: Job
metadata:
  name: keystone-batch-eval
  namespace: keystone
  labels:
    app.kubernetes.io/name: keystone-batch-eval
    app.kubernetes.io/component: batch-pipeline
spec:
  # Run N parallel evaluations (one per kernel type)
  parallelism: 4
  completions: 12
  completionMode: Indexed
  backoffLimit: 3
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keystone-batch-eval
    spec:
      restartPolicy: Never
      initContainers:
        # Map job index to kernel type
        - name: init-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              KERNELS="flash_attn_prefill paged_attn_decode mla_attn fused_moe gemm_w8a8 gemm_bf16 rms_norm rope_embedding kv_cache_ops all_reduce act_quant_fp8 silu_mul"
              KERNEL=$(echo $KERNELS | tr ' ' '\n' | sed -n "$((JOB_COMPLETION_INDEX + 1))p")
              echo "$KERNEL" > /config/kernel_type
              echo "Job index $JOB_COMPLETION_INDEX -> kernel: $KERNEL"
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          volumeMounts:
            - name: config
              mountPath: /config
      containers:
        - name: eval
          image: keystone-eval:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              KERNEL=$(cat /config/kernel_type)
              python pipeline.py \
                --model "$MODEL_ID" \
                --kernel "$KERNEL" \
                --framework "$FRAMEWORK" \
                --gpu "$GPU_ARCH" \
                --agent-version "$AGENT_VERSION" \
                --trajectory-store couchdb \
                --leaderboard
          env:
            - name: MODEL_ID
              value: "deepseek-ai/DeepSeek-R1"
            - name: FRAMEWORK
              value: "sglang"
            - name: GPU_ARCH
              value: "gfx950"
            - name: AGENT_VERSION
              value: "v1.0"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: anthropic-api-key
            - name: COUCHDB_URL
              value: "http://couchdb.keystone.svc.cluster.local:5984"
          volumeMounts:
            - name: output
              mountPath: /workspace/output
            - name: rocm-repos
              mountPath: /workspace/tools/rocm
              readOnly: true
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              amd.com/gpu: "1"
              memory: "32Gi"
            limits:
              amd.com/gpu: "1"
              memory: "64Gi"
      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: keystone-output
        - name: rocm-repos
          persistentVolumeClaim:
            claimName: keystone-rocm-repos
        - name: model-cache
          persistentVolumeClaim:
            claimName: keystone-model-cache
        - name: config
          emptyDir: {}
      nodeSelector:
        accelerator: amd-gpu
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

apiVersion: batch/v1
kind: CronJob
metadata:
  name: keystone-nightly-eval
  namespace: keystone
  labels:
    app.kubernetes.io/name: keystone-nightly-eval
    app.kubernetes.io/component: nightly-pipeline
spec:
  schedule: "0 2 * * *"  # 2 AM UTC daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      ttlSecondsAfterFinished: 259200  # 3 days
      template:
        metadata:
          labels:
            app.kubernetes.io/name: keystone-nightly-eval
        spec:
          restartPolicy: Never
          containers:
            - name: eval
              image: keystone-eval:latest
              imagePullPolicy: Always
              command: ["python", "pipeline.py"]
              args:
                - "--model"
                - "deepseek-ai/DeepSeek-R1"
                - "--kernel"
                - "all"
                - "--framework"
                - "sglang"
                - "--gpu"
                - "gfx950"
                - "--agent-version"
                - "nightly-$(date +%Y%m%d)"
                - "--trajectory-store"
                - "couchdb"
                - "--leaderboard"
                - "--max-iterations"
                - "3"
              env:
                - name: ANTHROPIC_API_KEY
                  valueFrom:
                    secretKeyRef:
                      name: keystone-secrets
                      key: anthropic-api-key
                - name: COUCHDB_URL
                  value: "http://couchdb.keystone.svc.cluster.local:5984"
              volumeMounts:
                - name: output
                  mountPath: /workspace/output
                - name: rocm-repos
                  mountPath: /workspace/tools/rocm
                  readOnly: true
                - name: model-cache
                  mountPath: /root/.cache/huggingface
              resources:
                requests:
                  amd.com/gpu: "1"
                  memory: "32Gi"
                limits:
                  amd.com/gpu: "1"
                  memory: "64Gi"
          volumes:
            - name: output
              persistentVolumeClaim:
                claimName: keystone-output
            - name: rocm-repos
              persistentVolumeClaim:
                claimName: keystone-rocm-repos
            - name: model-cache
              persistentVolumeClaim:
                claimName: keystone-model-cache
          nodeSelector:
            accelerator: amd-gpu
          tolerations:
            - key: "amd.com/gpu"
              operator: "Exists"
              effect: "NoSchedule"

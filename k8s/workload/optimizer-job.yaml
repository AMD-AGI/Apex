apiVersion: batch/v1
kind: Job
metadata:
  name: apex-workload-optimizer
  namespace: keystone
  labels:
    app.kubernetes.io/name: apex-workload-optimizer
    app.kubernetes.io/component: workload-pipeline
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 172800
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apex-workload-optimizer
    spec:
      restartPolicy: Never
      containers:
        - name: optimizer
          image: apex-workload:latest
          imagePullPolicy: IfNotPresent
          args:
            - "--benchmark-config"
            - "$(BENCHMARK_CONFIG)"
            - "--kernel-types"
            - "$(KERNEL_TYPES)"
            - "--kernels"
            - "$(KERNELS)"
            - "--max-iterations"
            - "$(MAX_ITERATIONS)"
            - "--agent-version"
            - "$(AGENT_VERSION)"
            - "--trajectory-store"
            - "couchdb"
            - "--leaderboard"
          env:
            - name: BENCHMARK_CONFIG
              value: "examples/benchmark_vllm_gptoss_120b.yaml"
            - name: KERNEL_TYPES
              value: "all"
            - name: KERNELS
              value: "all"
            - name: MAX_ITERATIONS
              value: "5"
            - name: AGENT_VERSION
              value: "v1.0"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: anthropic-api-key
            - name: COUCHDB_URL
              value: "http://couchdb.keystone.svc.cluster.local:5984"
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: couchdb-user
            - name: COUCHDB_PASS
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: couchdb-pass
          volumeMounts:
            - name: output
              mountPath: /workspace/output
            - name: results
              mountPath: /workspace/results
            - name: rocm-repos
              mountPath: /workspace/tools/rocm
              readOnly: true
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: trajectories
              mountPath: /workspace/trajectories
          resources:
            requests:
              cpu: "8"
              memory: "64Gi"
              amd.com/gpu: "8"
            limits:
              cpu: "16"
              memory: "128Gi"
              amd.com/gpu: "8"

        # MCP sidecar
        - name: mcp-sidecar
          image: keystone-mcp:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: rocm-repos
              mountPath: /workspace/tools/rocm
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: "4Gi"
            limits:
              cpu: "2"
              memory: "8Gi"

      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: keystone-output
        - name: results
          persistentVolumeClaim:
            claimName: keystone-results
        - name: rocm-repos
          persistentVolumeClaim:
            claimName: keystone-rocm-repos
        - name: model-cache
          persistentVolumeClaim:
            claimName: keystone-model-cache
        - name: trajectories
          persistentVolumeClaim:
            claimName: keystone-trajectories

      nodeSelector:
        accelerator: amd-gpu
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

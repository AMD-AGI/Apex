apiVersion: batch/v1
kind: Job
metadata:
  name: apex-workload-batch
  namespace: keystone
  labels:
    app.kubernetes.io/name: apex-workload-batch
    app.kubernetes.io/component: workload-batch
spec:
  # Run multiple workload configs in parallel (one per index).
  # Each completion maps to a different benchmark config via the init container.
  parallelism: 4
  completions: 4
  completionMode: Indexed
  backoffLimit: 2
  ttlSecondsAfterFinished: 259200
  template:
    metadata:
      labels:
        app.kubernetes.io/name: apex-workload-batch
    spec:
      restartPolicy: Never
      initContainers:
        - name: init-config
          image: busybox:1.36
          command: ["sh", "-c"]
          args:
            - |
              CONFIGS="examples/benchmark_vllm_gptoss_120b.yaml examples/benchmark_vllm.yaml examples/benchmark_sglang.yaml examples/benchmark_vllm_tracelens.yaml"
              CONFIG=$(echo $CONFIGS | tr ' ' '\n' | sed -n "$((JOB_COMPLETION_INDEX + 1))p")
              echo "$CONFIG" > /config/benchmark_config
              echo "Job index $JOB_COMPLETION_INDEX -> config: $CONFIG"
          env:
            - name: JOB_COMPLETION_INDEX
              valueFrom:
                fieldRef:
                  fieldPath: metadata.annotations['batch.kubernetes.io/job-completion-index']
          volumeMounts:
            - name: config
              mountPath: /config

      containers:
        - name: optimizer
          image: apex-workload:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              BENCH_CONFIG=$(cat /config/benchmark_config)
              python workload_optimizer.py \
                --benchmark-config "$BENCH_CONFIG" \
                --kernel-types "$KERNEL_TYPES" \
                --kernels "$KERNELS" \
                --max-iterations "$MAX_ITERATIONS" \
                --agent-version "$AGENT_VERSION" \
                --trajectory-store couchdb \
                --leaderboard
          env:
            - name: KERNEL_TYPES
              value: "all"
            - name: KERNELS
              value: "all"
            - name: MAX_ITERATIONS
              value: "5"
            - name: AGENT_VERSION
              value: "v1.0"
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: anthropic-api-key
            - name: COUCHDB_URL
              value: "http://couchdb.keystone.svc.cluster.local:5984"
            - name: COUCHDB_USER
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: couchdb-user
            - name: COUCHDB_PASS
              valueFrom:
                secretKeyRef:
                  name: keystone-secrets
                  key: couchdb-pass
          volumeMounts:
            - name: output
              mountPath: /workspace/output
            - name: results
              mountPath: /workspace/results
            - name: rocm-repos
              mountPath: /workspace/tools/rocm
              readOnly: true
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: config
              mountPath: /config
              readOnly: true
          resources:
            requests:
              cpu: "8"
              memory: "64Gi"
              amd.com/gpu: "8"
            limits:
              cpu: "16"
              memory: "128Gi"
              amd.com/gpu: "8"

      volumes:
        - name: output
          persistentVolumeClaim:
            claimName: keystone-output
        - name: results
          persistentVolumeClaim:
            claimName: keystone-results
        - name: rocm-repos
          persistentVolumeClaim:
            claimName: keystone-rocm-repos
        - name: model-cache
          persistentVolumeClaim:
            claimName: keystone-model-cache
        - name: config
          emptyDir: {}

      nodeSelector:
        accelerator: amd-gpu
      tolerations:
        - key: "amd.com/gpu"
          operator: "Exists"
          effect: "NoSchedule"

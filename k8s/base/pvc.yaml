apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keystone-output
  namespace: keystone
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 50Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keystone-rocm-repos
  namespace: keystone
spec:
  accessModes: [ReadOnlyMany]
  resources:
    requests:
      storage: 100Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keystone-model-cache
  namespace: keystone
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 500Gi
  storageClassName: standard
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: keystone-trajectories
  namespace: keystone
spec:
  accessModes: [ReadWriteMany]
  resources:
    requests:
      storage: 20Gi
  storageClassName: standard

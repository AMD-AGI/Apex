apiVersion: apps/v1
kind: Deployment
metadata:
  name: keystone-mcp
  namespace: keystone
  labels:
    app.kubernetes.io/name: keystone-mcp
    app.kubernetes.io/component: mcp-servers
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: keystone-mcp
  template:
    metadata:
      labels:
        app.kubernetes.io/name: keystone-mcp
    spec:
      containers:
        - name: mcp
          image: keystone-mcp:latest
          imagePullPolicy: IfNotPresent
          volumeMounts:
            - name: rocm-repos
              mountPath: /workspace/tools/rocm
              readOnly: true
          resources:
            requests:
              cpu: "2"
              memory: "8Gi"
            limits:
              cpu: "4"
              memory: "16Gi"
      volumes:
        - name: rocm-repos
          persistentVolumeClaim:
            claimName: keystone-rocm-repos
